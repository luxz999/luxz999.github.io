<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Profile luxz</title>
  <link rel="stylesheet" type="text/css" href="css/style.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.7/css/all.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">


  <script src="js/invisible.js?ts=1648958400"></script>

<body>
  <div class="card">
    <div class="ds-top"></div>
    <div class="avatar-holder">
      <img src=pr.jpg alt="luxz">
    </div>
    <div class="name">
      <a href="https://www.instagram.com/it.twxrz/" target="_blank">luxz</a>
    </div>
    <div class="button">
      <a href="https://www.github.com/luxz999" target="_blank"><i class="fa fa-github"></i> GITHUB</a>
    </div>
    <div class="ds-info">
      <div class="ds pens">
        <h6 title="Number of pens created by the user">Pens <i class="fas fa-edit"></i></h6>
        <p>12</p>
      </div>
      <div class="ds projects">
        <h6 title="Number of projects created by the user">Projects <i class="fas fa-folder"></i></h6>
        <p>30</p>
      </div>
      <div class="ds posts">
        <h6 title="Number of posts">Posts <i class="fas fa-comments"></i></h6>
        <p>8</p>
      </div>
    </div>
    <div class="ds-skill">
      <h6>Skill <i class="fa fa-code" aria-hidden="true"></i></h6>
      <div class="skill python">
        <h6><i class="fab fa-python"></i> PYTHON </h6>
        <div class="bar bar-python">
          <p>80%</p>
        </div>
      </div>
      <div class="skill js">
        <h6><i class="fab fa-js"></i> JavaScript </h6>
        <div class="bar bar-js">
          <p>60%</p>
        </div>
      </div>
      <div class="skill html">
        <h6><i class="fab fa-html5"></i> HTML5 </h6>
        <div class="bar bar-html5">
          <p>20%</p>
        </div>
      </div>
    </div>
  </div>
  <script src="js/rocket-loader.min.js"></script>
  <audio controls autoplay id="song" class="hidden-audio">
    <source src="Speaking Sonar.mp3" type="audio/wav" />
    Your browser does not support the audio element.
  </audio>
  <script>
    document.addEventListener("click", musicPlay);
    function musicPlay() {
        var song = document.getElementById("song");
        song.volume = 0.4;
        song.play();

        document.removeEventListener("click", musicPlay);
    }

  </script>
</body>
</html>
